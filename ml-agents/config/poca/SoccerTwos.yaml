behaviors:
    SoccerTwos:
        trainer_type: poca
        hyperparameters:
            batch_size: 4096
            buffer_size: 409600
            learning_rate: 0.0001
            beta: 0.01
            epsilon: 0.3
            lambd: 0.95
            num_epoch: 4
            learning_rate_schedule: constant
        network_settings:
            normalize: true
            hidden_units: 1024
            num_layers: 4
            memory:
                sequence_length: 256
                memory_size: 512
            vis_encode_type: simple
            observation_shapes: [1085]
        reward_signals:
            extrinsic:
                gamma: 0.995
                strength: 1.0
        keep_checkpoints: 5
        max_steps: 50000000
        time_horizon: 1000
        summary_freq: 10000
        self_play:
            save_steps: 25000
            team_change: 100000
            swap_steps: 2000
            window: 20
            play_against_latest_model_ratio: 0.5
            initial_elo: 1200.0
